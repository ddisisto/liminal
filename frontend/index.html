<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal — Pretext Spike</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --user-scale: 1;

      /* Dark theme (default) */
      --bg: #0a0a0f;
      --fg: #c8c8d0;
      --fg-muted: #606068;
      --fg-faint: #505058;
      --fg-dim: #404048;
      --fg-ghost: #303038;
      --accent: #606080;
      --accent-hover: #8080a0;
      --border: #1a1a25;
      --border-mid: #2a2a35;
      --border-user: #3a5a3a;
      --fg-user: #a0c0a0;
      --surface: #101018;
      --surface-code: #12121a;
      --fg-strong: #d0d0d8;
      --fg-em: #b0b0b8;
      --fg-heading: #909098;
      --border-focus: #2a2a45;
      --border-attn: #6a5030;   /* warm amber — attention target */
    }

    [data-theme="light"] {
      --bg: #f5f5f0;
      --fg: #2a2a30;
      --fg-muted: #808088;
      --fg-faint: #909098;
      --fg-dim: #a0a0a8;
      --fg-ghost: #b8b8c0;
      --accent: #505070;
      --accent-hover: #404060;
      --border: #d8d8e0;
      --border-mid: #c8c8d0;
      --border-user: #7aaa7a;
      --fg-user: #3a6a3a;
      --surface: #eaeae5;
      --surface-code: #e4e4df;
      --fg-strong: #1a1a20;
      --fg-em: #3a3a42;
      --fg-heading: #4a4a52;
      --border-focus: #a0a0b8;
      --border-attn: #c09050;   /* warm amber for light theme */
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      transition: background 0.2s, color 0.2s;
    }

    #container {
      max-width: 700px;
      margin: 80px auto;
      padding: 0 24px;
      touch-action: pan-x pan-y;
    }

    /* Extra space below content so the tip can sit at 2/3 viewport height,
       plus room for the fixed input area */
    #timeline {
      padding-bottom: calc(33vh + 60px);
    }

    h1 {
      font-size: calc(1.6rem * var(--user-scale));
      font-weight: 200;
      color: var(--fg-muted);
      letter-spacing: 1.5em;
      text-transform: lowercase;
      text-align: center;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0;
      position: relative;
      will-change: letter-spacing, transform;
    }

    h1::before,
    h1::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 1px;
      background: var(--border-mid);
    }

    h1::before { top: 35%; }
    h1::after { bottom: 35%; }

    #banner {
      color: var(--fg-faint);
      font-size: calc(1.15rem * var(--user-scale));
      line-height: 1.6;
      margin-bottom: 40px;
      border-left: 2px solid var(--border);
      padding-left: 12px;
    }

    #banner p {
      margin-bottom: 8px;
    }

    #banner p:last-child {
      margin-bottom: 0;
    }

    #banner a {
      color: var(--accent);
      text-decoration: none;
    }

    #banner a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .block {
      margin-bottom: 16px;
      padding: 8px 0;
      white-space: pre-wrap;
      --attention: 0;
      transition: opacity 150ms ease;
    }

    .block:hover {
      opacity: 1 !important;
      border-left-width: 4px;
      padding-left: 10px;
    }

    .block--rendered {
      white-space: normal;
    }

    .block--assistant {
      border-left: 2px solid color-mix(
        in oklch,
        var(--border-mid),
        var(--border-attn) calc(var(--attention) * 100%)
      );
      padding-left: 12px;
    }

    .block--user {
      border-left: 2px solid color-mix(
        in oklch,
        var(--border-user),
        var(--border-attn) calc(var(--attention) * 100%)
      );
      padding-left: 12px;
      color: var(--fg-user);
    }

    .token {
      display: inline;
      transition: opacity 150ms ease-out;
    }

    .token--entering {
      opacity: 0;
    }

    /* Subtle cursor at the end of streaming */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--fg-muted);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Chunk boundary indicator */
    .chunk-boundary {
      text-align: center;
      padding: 24px 0;
      color: var(--fg-dim);
      font-size: 12px;
      font-family: monospace;
      letter-spacing: 0.1em;
    }

    .chunk-boundary::before {
      content: '▼ scroll down to continue ▼';
    }

    .chunk-boundary--loading::before {
      content: '— loading —';
    }

    #input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 24px 16px;
      background: linear-gradient(transparent, var(--bg) 12px);
      display: flex;
      justify-content: center;
    }

    #input-area textarea {
      width: 100%;
      max-width: 700px;
      background: var(--surface);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.5;
      resize: none;
      overflow-y: hidden;
      outline: none;
      transition: border-color 0.15s ease-out, font-size 0.15s ease-out;
    }

    #input-area textarea:focus {
      border-color: var(--border-focus);
    }

    #input-area textarea::placeholder {
      color: var(--fg-ghost);
    }

    /* Control buttons */
    .controls {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .controls button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--fg-dim);
      font-family: monospace;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: color 0.15s, border-color 0.15s;
    }

    .controls button:hover {
      color: var(--fg-muted);
      border-color: var(--border-mid);
    }

    /* Rendered markdown within blocks */
    .block--rendered h1, .block--rendered h2, .block--rendered h3,
    .block--rendered h4, .block--rendered h5, .block--rendered h6 {
      color: var(--fg-heading);
      font-weight: 500;
      margin: 0.8em 0 0.4em;
    }

    .block--rendered h1 { font-size: 1.3em; }
    .block--rendered h2 { font-size: 1.15em; }
    .block--rendered h3 { font-size: 1.05em; }

    .block--rendered p {
      margin: 0.5em 0;
    }

    .block--rendered strong {
      color: var(--fg-strong);
      font-weight: 600;
    }

    .block--rendered em {
      color: var(--fg-em);
      font-style: italic;
    }

    .block--rendered code {
      background: var(--surface-code);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-family: monospace;
      font-size: 0.9em;
    }

    .block--rendered pre {
      background: var(--surface-code);
      padding: 12px 14px;
      border-radius: 4px;
      margin: 0.6em 0;
      overflow-x: auto;
    }

    .block--rendered pre code {
      background: none;
      padding: 0;
    }

    .block--rendered ul, .block--rendered ol {
      padding-left: 1.5em;
      margin: 0.4em 0;
    }

    .block--rendered li {
      margin: 0.2em 0;
    }

    .block--rendered a {
      color: var(--accent);
      text-decoration: none;
    }

    .block--rendered a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .block--rendered hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1em 0;
    }

    /* Navigation controls — right edge, thumb-friendly */
    .nav-btn {
      position: fixed;
      right: 16px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--fg-dim);
      font-size: 14px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .nav-btn:hover {
      color: var(--fg-muted);
      border-color: var(--border-mid);
    }

    #nav-top { top: 33vh; }
    #nav-end { top: 66vh; }

    #status {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      color: var(--fg-dim);
      font-family: monospace;
    }
  </style>
  <script>
    // Detect system theme before first paint to avoid flash
    if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light')
    }
  </script>
</head>
<body>
  <div id="container">
    <h1>Liminal</h1>
    <div id="banner">
      <p>Text that knows it's being read. Per-token rendering via <a href="https://github.com/chenglou/pretext">Pretext.js</a>, pulled by the reader one paragraph at a time.</p>
      <p>Scroll down at the bottom to advance. This is an early proof of concept — the streaming is simulated, but the rendering mechanics are real.</p>
      <p><a href="https://github.com/ddisisto/liminal">github.com/ddisisto/liminal</a></p>
    </div>
    <div id="timeline"></div>
  </div>
  <div class="controls">
    <button id="theme-toggle" title="Toggle light/dark theme">dark</button>
    <button id="render-toggle" title="Toggle markdown rendering">rendered</button>
  </div>
  <button id="nav-top" class="nav-btn" title="Jump to top (Home)">&#x25B2;</button>
  <button id="nav-end" class="nav-btn" title="Jump to end (End)">&#x25BC;</button>
  <div id="status"></div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
