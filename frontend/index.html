<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal — Pretext Spike</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --user-scale: 1;
    }

    body {
      background: #0a0a0f;
      color: #c8c8d0;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    #container {
      max-width: 700px;
      margin: 80px auto;
      padding: 0 24px;
      touch-action: pan-x pan-y;
    }

    /* Extra space below content so the tip can sit at 2/3 viewport height,
       plus room for the fixed input area */
    #timeline {
      padding-bottom: calc(33vh + 60px);
    }

    h1 {
      font-size: calc(2rem * var(--user-scale));
      font-weight: 400;
      color: #606068;
      margin-bottom: 16px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #banner {
      color: #505058;
      font-size: calc(1.15rem * var(--user-scale));
      line-height: 1.6;
      margin-bottom: 40px;
      border-left: 2px solid #1a1a25;
      padding-left: 12px;
    }

    #banner p {
      margin-bottom: 8px;
    }

    #banner p:last-child {
      margin-bottom: 0;
    }

    #banner a {
      color: #606080;
      text-decoration: none;
    }

    #banner a:hover {
      color: #8080a0;
      text-decoration: underline;
    }

    .block {
      margin-bottom: 16px;
      padding: 8px 0;
    }

    .block--assistant {
      border-left: 2px solid #2a2a35;
      padding-left: 12px;
    }

    .block--user {
      border-left: 2px solid #3a5a3a;
      padding-left: 12px;
      color: #a0c0a0;
    }

    .token {
      display: inline;
      transition: opacity 150ms ease-out;
    }

    .token--entering {
      opacity: 0;
    }

    /* Subtle cursor at the end of streaming */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #606068;
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Chunk boundary indicator */
    .chunk-boundary {
      text-align: center;
      padding: 24px 0;
      color: #404048;
      font-size: 12px;
      font-family: monospace;
      letter-spacing: 0.1em;
    }

    .chunk-boundary::before {
      content: '▼ scroll down to continue ▼';
    }

    .chunk-boundary--loading::before {
      content: '— loading —';
    }

    #input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 24px 16px;
      background: linear-gradient(transparent, #0a0a0f 12px);
      display: flex;
      justify-content: center;
    }

    #input-area textarea {
      width: 100%;
      max-width: 700px;
      background: #101018;
      color: #c8c8d0;
      border: 1px solid #1a1a25;
      border-radius: 6px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.5;
      resize: none;
      overflow-y: hidden;
      outline: none;
      transition: border-color 0.15s ease-out, font-size 0.15s ease-out;
    }

    #input-area textarea:focus {
      border-color: #2a2a45;
    }

    #input-area textarea::placeholder {
      color: #303038;
    }

    /* Render mode toggle */
    #render-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: none;
      border: 1px solid #1a1a25;
      border-radius: 4px;
      color: #404048;
      font-family: monospace;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: color 0.15s, border-color 0.15s;
      z-index: 10;
    }

    #render-toggle:hover {
      color: #606068;
      border-color: #2a2a35;
    }

    /* Rendered markdown within blocks */
    .block--rendered h1, .block--rendered h2, .block--rendered h3,
    .block--rendered h4, .block--rendered h5, .block--rendered h6 {
      color: #909098;
      font-weight: 500;
      margin: 0.8em 0 0.4em;
    }

    .block--rendered h1 { font-size: 1.3em; }
    .block--rendered h2 { font-size: 1.15em; }
    .block--rendered h3 { font-size: 1.05em; }

    .block--rendered p {
      margin: 0.5em 0;
    }

    .block--rendered strong {
      color: #d0d0d8;
      font-weight: 600;
    }

    .block--rendered em {
      color: #b0b0b8;
      font-style: italic;
    }

    .block--rendered code {
      background: #12121a;
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-family: monospace;
      font-size: 0.9em;
    }

    .block--rendered pre {
      background: #12121a;
      padding: 12px 14px;
      border-radius: 4px;
      margin: 0.6em 0;
      overflow-x: auto;
    }

    .block--rendered pre code {
      background: none;
      padding: 0;
    }

    .block--rendered ul, .block--rendered ol {
      padding-left: 1.5em;
      margin: 0.4em 0;
    }

    .block--rendered li {
      margin: 0.2em 0;
    }

    .block--rendered a {
      color: #606080;
      text-decoration: none;
    }

    .block--rendered a:hover {
      color: #8080a0;
      text-decoration: underline;
    }

    .block--rendered hr {
      border: none;
      border-top: 1px solid #1a1a25;
      margin: 1em 0;
    }

    #status {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      color: #404048;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="container">
    <h1>Liminal</h1>
    <div id="banner">
      <p>Text that knows it's being read. Per-token rendering via <a href="https://github.com/chenglou/pretext">Pretext.js</a>, pulled by the reader one paragraph at a time.</p>
      <p>Scroll down at the bottom to advance. This is an early proof of concept — the streaming is simulated, but the rendering mechanics are real.</p>
      <p><a href="https://github.com/ddisisto/liminal">github.com/ddisisto/liminal</a></p>
    </div>
    <div id="timeline"></div>
  </div>
  <button id="render-toggle" title="Toggle markdown rendering">raw</button>
  <div id="status"></div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
